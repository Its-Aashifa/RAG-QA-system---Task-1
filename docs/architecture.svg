<svg viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#0d4a9e"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#155724"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9e6a03"/>
      <stop offset="100%" style="stop-color:#6d4700"/>
    </linearGradient>
    <linearGradient id="storeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8957e5"/>
      <stop offset="100%" style="stop-color:#5a32a3"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#da3633"/>
      <stop offset="100%" style="stop-color:#8e2422"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#bc8cff"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f85149"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="660" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="1">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="0" y1="420" x2="900" y2="420"/>
    <line x1="0" y1="480" x2="900" y2="480"/>
    <line x1="0" y1="540" x2="900" y2="540"/>
    <line x1="0" y1="600" x2="900" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="660"/>
    <line x1="200" y1="0" x2="200" y2="660"/>
    <line x1="300" y1="0" x2="300" y2="660"/>
    <line x1="400" y1="0" x2="400" y2="660"/>
    <line x1="500" y1="0" x2="500" y2="660"/>
    <line x1="600" y1="0" x2="600" y2="660"/>
    <line x1="700" y1="0" x2="700" y2="660"/>
    <line x1="800" y1="0" x2="800" y2="660"/>
  </g>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="bold" filter="url(#glow)" letter-spacing="3">RAG QUESTION ANSWERING SYSTEM — ARCHITECTURE</text>
  <line x1="50" y1="46" x2="850" y2="46" stroke="#21262d" stroke-width="1"/>

  <!-- ═══ CLIENT ═══ -->
  <rect x="330" y="62" width="240" height="58" rx="6" fill="url(#clientGrad)" stroke="#388bfd" stroke-width="1.5" opacity="0.95"/>
  <text x="450" y="86" text-anchor="middle" fill="#cae8ff" font-size="12" font-weight="bold">CLIENT</text>
  <text x="450" y="104" text-anchor="middle" fill="#88c4ff" font-size="10">curl / Postman / Frontend App</text>

  <!-- Arrow: Client → API -->
  <line x1="450" y1="120" x2="450" y2="148" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  <text x="460" y="138" fill="#58a6ff" font-size="9">HTTP</text>

  <!-- ═══ FASTAPI LAYER ═══ -->
  <rect x="60" y="152" width="780" height="130" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="80" y="172" fill="#3fb950" font-size="11" font-weight="bold">⚡ FastAPI Application  (main.py)</text>
  <text x="740" y="172" fill="#3fb950" font-size="9">SlowAPI Rate Limiting</text>

  <!-- Route boxes -->
  <rect x="90" y="182" width="168" height="52" rx="5" fill="url(#apiGrad)" stroke="#3fb950" stroke-width="1"/>
  <text x="174" y="202" text-anchor="middle" fill="#d2f4d2" font-size="11" font-weight="bold">POST /upload</text>
  <text x="174" y="218" text-anchor="middle" fill="#88d399" font-size="9">10 req/min per IP</text>
  <text x="174" y="230" text-anchor="middle" fill="#88d399" font-size="9">Pydantic validation</text>

  <rect x="280" y="182" width="168" height="52" rx="5" fill="url(#apiGrad)" stroke="#3fb950" stroke-width="1"/>
  <text x="364" y="202" text-anchor="middle" fill="#d2f4d2" font-size="11" font-weight="bold">GET /jobs/{id}</text>
  <text x="364" y="218" text-anchor="middle" fill="#88d399" font-size="9">Poll ingestion status</text>
  <text x="364" y="230" text-anchor="middle" fill="#88d399" font-size="9">PENDING→DONE|FAIL</text>

  <rect x="470" y="182" width="168" height="52" rx="5" fill="url(#apiGrad)" stroke="#3fb950" stroke-width="1"/>
  <text x="554" y="202" text-anchor="middle" fill="#d2f4d2" font-size="11" font-weight="bold">POST /query</text>
  <text x="554" y="218" text-anchor="middle" fill="#88d399" font-size="9">30 req/min per IP</text>
  <text x="554" y="230" text-anchor="middle" fill="#88d399" font-size="9">Returns latency_ms</text>

  <rect x="660" y="182" width="158" height="52" rx="5" fill="url(#apiGrad)" stroke="#3fb950" stroke-width="1"/>
  <text x="739" y="202" text-anchor="middle" fill="#d2f4d2" font-size="11" font-weight="bold">GET /documents</text>
  <text x="739" y="218" text-anchor="middle" fill="#88d399" font-size="9">List indexed docs</text>
  <text x="739" y="230" text-anchor="middle" fill="#88d399" font-size="9">Bonus endpoint</text>

  <!-- ═══ Arrows API → lower layers ═══ -->
  <!-- Upload → Job Manager -->
  <line x1="174" y1="282" x2="174" y2="316" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <!-- Jobs → Job Store -->
  <line x1="364" y1="282" x2="364" y2="316" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <!-- Query → Vector Store -->
  <line x1="554" y1="282" x2="554" y2="376" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- ═══ JOB MANAGER ═══ -->
  <rect x="60" y="320" width="340" height="80" rx="8" fill="#1c1610" stroke="#e3b341" stroke-width="1.5"/>
  <text x="80" y="340" fill="#e3b341" font-size="11" font-weight="bold">🔧 Background Job Manager  (job_manager.py)</text>
  <text x="80" y="358" fill="#d29922" font-size="9">ThreadPoolExecutor (max_workers=4)</text>

  <!-- Pipeline steps inside job manager -->
  <rect x="80" y="365" width="68" height="26" rx="3" fill="#2d2008" stroke="#e3b341" stroke-width="1"/>
  <text x="114" y="382" text-anchor="middle" fill="#f0c040" font-size="9">① Parser</text>

  <line x1="148" y1="378" x2="158" y2="378" stroke="#e3b341" stroke-width="1" marker-end="url(#arrowOrange)"/>

  <rect x="160" y="365" width="68" height="26" rx="3" fill="#2d2008" stroke="#e3b341" stroke-width="1"/>
  <text x="194" y="382" text-anchor="middle" fill="#f0c040" font-size="9">② Chunker</text>

  <line x1="228" y1="378" x2="238" y2="378" stroke="#e3b341" stroke-width="1" marker-end="url(#arrowOrange)"/>

  <rect x="240" y="365" width="68" height="26" rx="3" fill="#2d2008" stroke="#e3b341" stroke-width="1"/>
  <text x="274" y="382" text-anchor="middle" fill="#f0c040" font-size="9">③ Embedder</text>

  <line x1="308" y1="378" x2="318" y2="378" stroke="#e3b341" stroke-width="1" marker-end="url(#arrowOrange)"/>

  <rect x="320" y="365" width="68" height="26" rx="3" fill="#2d2008" stroke="#e3b341" stroke-width="1"/>
  <text x="354" y="382" text-anchor="middle" fill="#f0c040" font-size="9">④ FAISS add</text>

  <!-- Job Manager → Vector Store -->
  <line x1="388" y1="378" x2="470" y2="400" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- ═══ VECTOR STORE (FAISS) ═══ -->
  <rect x="470" y="376" width="240" height="100" rx="8" fill="#1a1230" stroke="#8957e5" stroke-width="1.5"/>
  <text x="490" y="396" fill="#bc8cff" font-size="11" font-weight="bold">🗄  FAISS Vector Store  (vector_store.py)</text>
  <text x="490" y="412" fill="#9a70e0" font-size="9">IndexFlatIP  |  384-dim embeddings</text>
  <text x="490" y="428" fill="#9a70e0" font-size="9">L2-normalized → cosine similarity</text>
  <text x="490" y="444" fill="#9a70e0" font-size="9">Persisted: faiss_store/index.{index,meta}</text>
  <text x="490" y="460" fill="#9a70e0" font-size="9">Embedding: all-MiniLM-L6-v2 (local, 384d)</text>

  <!-- Query → LLM -->
  <line x1="554" y1="476" x2="554" y2="516" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="562" y="500" fill="#f85149" font-size="9">top-k chunks</text>

  <!-- ═══ LLM SERVICE ═══ -->
  <rect x="380" y="520" width="340" height="80" rx="8" fill="#1a0a0a" stroke="#da3633" stroke-width="1.5"/>
  <text x="400" y="540" fill="#f85149" font-size="11" font-weight="bold">🤖 LLM Service  (llm.py)</text>
  <text x="400" y="558" fill="#c9403e" font-size="9">Groq API  ·  LLaMA 3 70B  ·  temp=0.2</text>
  <text x="400" y="574" fill="#c9403e" font-size="9">Grounded system prompt — no hallucination</text>
  <text x="400" y="590" fill="#c9403e" font-size="9">Tracks: latency_ms, tokens used, model name</text>

  <!-- LLM → response back to client -->
  <line x1="450" y1="520" x2="390" y2="282" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="355" y="420" fill="#58a6ff" font-size="9" opacity="0.8">response</text>

  <!-- ═══ STORAGE LAYER ═══ -->
  <rect x="60" y="490" width="300" height="110" rx="8" fill="#0d1f0d" stroke="#2ea043" stroke-width="1"/>
  <text x="80" y="510" fill="#3fb950" font-size="11" font-weight="bold">💾 Storage Layer</text>

  <rect x="80" y="518" width="120" height="36" rx="4" fill="#0d2b0d" stroke="#3fb950" stroke-width="1"/>
  <text x="140" y="534" text-anchor="middle" fill="#7ee787" font-size="9" font-weight="bold">uploads/</text>
  <text x="140" y="547" text-anchor="middle" fill="#56a05e" font-size="8">PDF + TXT files</text>

  <rect x="220" y="518" width="120" height="36" rx="4" fill="#0d2b0d" stroke="#3fb950" stroke-width="1"/>
  <text x="280" y="534" text-anchor="middle" fill="#7ee787" font-size="9" font-weight="bold">faiss_store/</text>
  <text x="280" y="547" text-anchor="middle" fill="#56a05e" font-size="8">index + metadata</text>

  <text x="80" y="580" fill="#3fb950" font-size="9">In-memory job store (dict) — reset on restart</text>
  <text x="80" y="594" fill="#56a05e" font-size="8">→ Swap for Redis in production</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="730" y="430" width="155" height="120" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="750" y="450" fill="#8b949e" font-size="10" font-weight="bold">LEGEND</text>
  <line x1="750" y1="462" x2="780" y2="462" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="786" y="466" fill="#8b949e" font-size="9">HTTP request</text>
  <line x1="750" y1="480" x2="780" y2="480" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="786" y="484" fill="#8b949e" font-size="9">Job pipeline</text>
  <line x1="750" y1="498" x2="780" y2="498" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="786" y="502" fill="#8b949e" font-size="9">Vector ops</text>
  <line x1="750" y1="516" x2="780" y2="516" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="786" y="520" fill="#8b949e" font-size="9">LLM call</text>
  <line x1="750" y1="534" x2="780" y2="534" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="786" y="538" fill="#8b949e" font-size="9">API response</text>

  <!-- Footer -->
  <line x1="50" y1="618" x2="850" y2="618" stroke="#21262d" stroke-width="1"/>
  <text x="450" y="638" text-anchor="middle" fill="#484f58" font-size="9">FastAPI · FAISS · sentence-transformers · Groq LLaMA 3 70B · SlowAPI · Pydantic v2</text>
  <text x="450" y="652" text-anchor="middle" fill="#484f58" font-size="8">Chunk size: 512 chars · Overlap: 64 chars · Top-K: 5 · Embedding dim: 384</text>
</svg>
